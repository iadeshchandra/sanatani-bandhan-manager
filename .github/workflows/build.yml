name: Build SHDA Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev openjdk-17-jdk

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install setuptools
          pip install cython==0.29.33 buildozer virtualenv

      - name: Build with Buildozer
        run: |
          buildozer android debug
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SHDA-Management-App
          path: bin/*.apk
